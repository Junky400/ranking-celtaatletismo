name: Agente de Ranking Celta

on:
  schedule:
    # Se ejecuta todos los lunes a las 02:00 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch: # Permite ejecución manual con el botón "Run workflow"

permissions:
  contents: write # Permiso explícito para que el robot pueda escribir archivos

jobs:
  scrape_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar herramientas de extracción
        run: |
          pip install pandas requests lxml html5lib

      - name: Ejecutar el Agente (Script de Python)
        run: python scraper_celta.py

      - name: Guardar cambios en el Repositorio
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configuración de identidad del robot
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Añadir el archivo generado
          git add public/ranking_celta.csv
          
          # Solo hacer commit y push si el archivo ha cambiado realmente
          if git diff --staged --quiet; then
            echo "No hay cambios en el ranking hoy."
          else
            git commit -m "Actualización automática ranking: $(date +'%Y-%m-%d')"
            git push origin main
          fi
