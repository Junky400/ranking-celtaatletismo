name: Agente de Ranking Celta

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4
        with:
          # Esto es clave: permite que el bot tenga permisos de push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar herramientas de extracción
        run: |
          pip install pandas requests lxml html5lib

      - name: Ejecutar el Agente (Script de Python)
        run: python scraper_celta.py

      - name: Guardar cambios en el Repositorio
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add public/ranking_celta.csv
          
          # Comprobamos si hay cambios
          if git diff --staged --quiet; then
            echo "No hay cambios para subir."
          else
            git commit -m "Actualización automática: $(date +'%Y-%m-%d')"
            # Usamos el token de forma explícita en el push
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          fi
