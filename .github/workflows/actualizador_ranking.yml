name: Agente de Ranking Celta

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Descarga todo el historial para evitar conflictos de ramas

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar herramientas
        run: pip install pandas requests lxml html5lib

      - name: Ejecutar el Agente
        run: python scraper_celta.py

      - name: Guardar cambios
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add public/ranking_celta.csv
          
          # Solo subir si hay cambios reales
          if git diff --staged --quiet; then
            echo "Sin cambios detectados."
          else
            git commit -m "Actualización automática ranking $(date +'%Y-%m-%d')"
            # Forzamos el push usando la URL con el token de seguridad
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main
          filización automática: $(date +'%Y-%m-%d')"
            # Usamos el token de forma explícita en el push
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          fi
