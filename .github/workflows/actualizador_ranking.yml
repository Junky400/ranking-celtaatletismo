name: Agente de Ranking Celta

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependencias
        run: pip install pandas requests lxml html5lib

      - name: Ejecutar Scraper
        run: python scraper_celta.py

      - name: Commit y Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Nos aseguramos de que el archivo existe antes de añadirlo
          if [ -f "public/ranking_celta.csv" ]; then
            git add public/ranking_celta.csv
            
            # Solo hacemos commit si hay cambios reales
            if ! git diff --cached --quiet; then
              git commit -m "Actualización automática: $(date +'%Y-%m-%d')"
              git push
            else
              echo "No hay cambios en los datos."
            fi
          else
            echo "Error: El script de Python no generó el archivo csv."
            exit 1
          fi
