- name: Ejecutar el Agente
        run: python scraper_celta.py

      - name: Guardar cambios
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # TRUCO FINAL: Si el script falló y no creó el archivo, lo creamos vacío aquí
          mkdir -p public
          touch public/ranking_celta.csv
          
          git add public/ranking_celta.csv
          
          if git diff --staged --quiet; then
            echo "Sin cambios nuevos que subir."
          else
            git commit -m "Actualización automática: $(date +'%Y-%m-%d')"
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main
          fi
